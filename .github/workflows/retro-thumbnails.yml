name: Upload Thumbnails to Previous Videos

on:
  workflow_dispatch:
    inputs:
      video1_id:
        description: 'First video ID (e.g. vl84qXeZhTg)'
        required: true
        default: 'vl84qXeZhTg'
      video1_topic:
        description: 'First video topic (e.g. Женщины-библиотекари античности)'
        required: true
        default: 'Женщины-библиотекари античности'
      video2_id:
        description: 'Second video ID (optional)'
        required: false
        default: '5MQrSiE_tJE'
      video2_topic:
        description: 'Second video topic (optional)'
        required: false
        default: 'Женщины в Древнем Сардах'

jobs:
  upload-thumbnails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client openai Pillow requests
      - name: Generate & upload thumbnails
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: |
          python upload_retro_thumbnails.py \
            "${{ github.event.inputs.video1_id }}" "${{ github.event.inputs.video1_topic }}" \
            "${{ github.event.inputs.video2_id }}" "${{ github.event.inputs.video2_topic }}"
